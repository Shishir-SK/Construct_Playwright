[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = 
    -v 
    --tb=short 
    --alluredir=allure-results
    --cov=pages
    --cov=tests
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --durations=10
    --strict-markers
    --disable-warnings
    --maxfail=5

# Coverage configuration
[coverage:run]
source = pages, tests
omit = 
    */tests/__pycache__/*
    */pages/__pycache__/*
    */conftest.py
    */venv/*
    */env/*
    */virtualenv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov
show_contexts = True

[coverage:xml]
output = coverage.xml

# Playwright options (can override via CLI):
# pytest --headed --slowmo 500
# pytest --browser webkit
