version: '3.8'

services:
  # Main test service
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: production
    container_name: construct-test-runner
    environment:
      - CONSTRUCT_BASE_URL=${CONSTRUCT_BASE_URL:-https://dev-app.helpconstruct.com}
      - VENDOR_EMAIL=${VENDOR_EMAIL}
      - CUSTOMER_EMAIL=${CUSTOMER_EMAIL}
      - CONSTRUCT_PASSWORD=${CONSTRUCT_PASSWORD}
      - CI=true
      - PYTEST_ADDOPTS=--maxfail=3 --tb=short --durations=10
    volumes:
      - ./allure-results:/app/allure-results
      - ./htmlcov:/app/htmlcov
      - ./test-results:/app/test-results
      - ./coverage.xml:/app/coverage.xml
    networks:
      - test-network
    command: pytest --browser chromium --alluredir=allure-results -v --cov=pages --cov=tests --cov-report=xml --cov-report=html

  # Allure report server
  allure-server:
    image: "docker.io/sscaling/allure-docker-service"
    container_name: construct-allure-server
    environment:
      - CHECK_RESULTS_EVERY_SECONDS=5
      - KEEP_HISTORY=1
      - KEEP_HISTORY_LATEST=25
    ports:
      - "5050:5050"
    volumes:
      - ./allure-results:/app/allure-results
      - ./allure-reports:/app/allure-reports
    networks:
      - test-network
    depends_on:
      - test-runner

  # Multi-browser testing
  test-chromium:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: production
    container_name: construct-test-chromium
    environment:
      - CONSTRUCT_BASE_URL=${CONSTRUCT_BASE_URL:-https://dev-app.helpconstruct.com}
      - VENDOR_EMAIL=${VENDOR_EMAIL}
      - CUSTOMER_EMAIL=${CUSTOMER_EMAIL}
      - CONSTRUCT_PASSWORD=${CONSTRUCT_PASSWORD}
      - CI=true
    volumes:
      - ./allure-results:/app/allure-results
    networks:
      - test-network
    command: pytest --browser chromium --alluredir=allure-results -v

  test-firefox:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: production
    container_name: construct-test-firefox
    environment:
      - CONSTRUCT_BASE_URL=${CONSTRUCT_BASE_URL:-https://dev-app.helpconstruct.com}
      - VENDOR_EMAIL=${VENDOR_EMAIL}
      - CUSTOMER_EMAIL=${CUSTOMER_EMAIL}
      - CONSTRUCT_PASSWORD=${CONSTRUCT_PASSWORD}
      - CI=true
    volumes:
      - ./allure-results:/app/allure-results
    networks:
      - test-network
    command: pytest --browser firefox --alluredir=allure-results -v

  test-webkit:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: production
    container_name: construct-test-webkit
    environment:
      - CONSTRUCT_BASE_URL=${CONSTRUCT_BASE_URL:-https://dev-app.helpconstruct.com}
      - VENDOR_EMAIL=${VENDOR_EMAIL}
      - CUSTOMER_EMAIL=${CUSTOMER_EMAIL}
      - CONSTRUCT_PASSWORD=${CONSTRUCT_PASSWORD}
      - CI=true
    volumes:
      - ./allure-results:/app/allure-results
    networks:
      - test-network
    command: pytest --browser webkit --alluredir=allure-results -v

  # Performance testing
  performance-test:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: production
    container_name: construct-performance-test
    environment:
      - CONSTRUCT_BASE_URL=${CONSTRUCT_BASE_URL:-https://dev-app.helpconstruct.com}
      - VENDOR_EMAIL=${VENDOR_EMAIL}
      - CUSTOMER_EMAIL=${CUSTOMER_EMAIL}
      - CONSTRUCT_PASSWORD=${CONSTRUCT_PASSWORD}
      - CI=true
    volumes:
      - ./performance-results:/app/performance-results
    networks:
      - test-network
    command: pytest tests/vendor/test_vendor_rfp_rfq_enhanced.py::TestVendorRFQEnhanced::test_vendor_quote_submission_performance --browser chromium -v --benchmark-only

  # Security scanning
  security-scan:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: development
    container_name: construct-security-scan
    volumes:
      - ./security-reports:/app/security-reports
    networks:
      - test-network
    command: |
      sh -c "
        bandit -r pages/ tests/ -f json -o /app/security-reports/bandit-report.json || true &&
        safety check --json --output /app/security-reports/safety-report.json || true &&
        flake8 pages/ tests/ --format=json --output-file=/app/security-reports/flake8-report.json || true
      "

  # Code quality
  code-quality:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: development
    container_name: construct-code-quality
    volumes:
      - ./quality-reports:/app/quality-reports
    networks:
      - test-network
    command: |
      sh -c "
        black --check --diff pages/ tests/ > /app/quality-reports/black-report.txt 2>&1 || true &&
        isort --check-only --diff pages/ tests/ > /app/quality-reports/isort-report.txt 2>&1 || true &&
        mypy pages/ tests/ --json-report /app/quality-reports/mypy-report || true
      "

networks:
  test-network:
    driver: bridge

volumes:
  allure-results:
  allure-reports:
  htmlcov:
  test-results:
  performance-results:
  security-reports:
  quality-reports:
