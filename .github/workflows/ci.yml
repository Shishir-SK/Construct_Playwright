name: Construct Automation CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        python-version: ['3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-html
    
    - name: Cache Playwright browsers
      uses: actions/cache@v3
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ matrix.browser }}
        restore-keys: |
          ${{ runner.os }}-playwright-
    
    - name: Install Playwright browsers
      run: |
        playwright install ${{ matrix.browser }}
        playwright install-deps
    
    - name: Run tests with coverage
      env:
        CONSTRUCT_BASE_URL: ${{ secrets.CONSTRUCT_BASE_URL }}
        VENDOR_EMAIL: ${{ secrets.VENDOR_EMAIL }}
        CUSTOMER_EMAIL: ${{ secrets.CUSTOMER_EMAIL }}
        CONSTRUCT_PASSWORD: ${{ secrets.CONSTRUCT_PASSWORD }}
      run: |
        pytest --browser ${{ matrix.browser }} \
               --cov=pages \
               --cov=tests \
               --cov-report=xml \
               --cov-report=html \
               --html=test-report-${{ matrix.browser }}.html \
               --self-contained-html \
               --alluredir=allure-results-${{ matrix.browser }} \
               -v \
               --tb=short
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: ${{ matrix.browser }}
        name: coverage-${{ matrix.browser }}
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.browser }}-${{ matrix.python-version }}
        path: |
          test-report-${{ matrix.browser }}.html
          allure-results-${{ matrix.browser }}
          htmlcov/
    
    - name: Generate Allure report
      if: matrix.browser == 'chromium' && matrix.python-version == '3.12'
      run: |
        allure generate allure-results-chromium -o allure-report --clean
    
    - name: Upload Allure report
      uses: actions/upload-artifact@v3
      if: matrix.browser == 'chromium' && matrix.python-version == '3.12'
      with:
        name: allure-report
        path: allure-report/

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install security tools
      run: |
        pip install bandit safety
    
    - name: Run security scan
      run: |
        bandit -r pages/ tests/ -f json -o bandit-report.json || true
        safety check --json --output safety-report.json || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install linting tools
      run: |
        pip install flake8 black isort mypy
    
    - name: Run code formatting check
      run: |
        black --check --diff pages/ tests/
        isort --check-only --diff pages/ tests/
    
    - name: Run linting
      run: |
        flake8 pages/ tests/ --format=json --output-file=flake8-report.json || true
    
    - name: Run type checking
      run: |
        mypy pages/ tests/ --json-report mypy-report || true
    
    - name: Upload code quality reports
      uses: actions/upload-artifact@v3
      with:
        name: code-quality-reports
        path: |
          flake8-report.json
          mypy-report/

  performance-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        playwright install chromium
    
    - name: Run performance tests
      env:
        CONSTRUCT_BASE_URL: ${{ secrets.CONSTRUCT_BASE_URL }}
        VENDOR_EMAIL: ${{ secrets.VENDOR_EMAIL }}
        CUSTOMER_EMAIL: ${{ secrets.CUSTOMER_EMAIL }}
        CONSTRUCT_PASSWORD: ${{ secrets.CONSTRUCT_PASSWORD }}
      run: |
        pytest tests/vendor/test_vendor_rfp_rfq_enhanced.py::TestVendorRFQEnhanced::test_vendor_quote_submission_performance \
               tests/customer/test_customer_rfp_enhanced.py::TestCustomerRFPEnhanced::test_customer_create_rfp_comprehensive \
               --browser chromium \
               --durations=10 \
               -v \
               --tb=short
    
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: |
          test-results/

  deploy-report:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [test, security-scan, code-quality]
    steps:
    - name: Download Allure report
      uses: actions/download-artifact@v3
      with:
        name: allure-report
        path: allure-report/
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        destination_dir: allure-reports
