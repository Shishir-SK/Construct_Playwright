name: Daily Smoke Tests

on:
  schedule:
    # Runs every day at 05:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch: {}

jobs:
  run-smoke:
    name: Run smoke suite and email report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Make run script executable
        run: chmod +x ./run_smoke_tests.sh

      - name: Run smoke tests
        run: ./run_smoke_tests.sh

      - name: Zip Allure report
        run: |
          cd docs && zip -r ../allure-report.zip allure-report

      - name: Commit Allure report to docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/allure-report

          # Only commit if there are changes (prevents loops)
          if ! git diff --cached --quiet; then
            git commit -m "chore: update Allure report (daily smoke run)"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes in Allure report, skipping commit."
          fi

      - name: Verify GitHub Pages report is available
        run: |
          url="https://shishir-sk.github.io/Construct_Playwright/allure-report/"
          echo "Checking $url"
          for i in {1..12}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "✅ Report is live: $url"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ Unable to reach report after retries (last status: $status)"
          exit 1

      - name: Email results
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Smoke Tests] Daily run - ${{ github.run_number }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            Smoke tests completed successfully.

            View the Allure report here:
            https://shishir-sk.github.io/Construct_Playwright/allure-report/

            (Attached: allure-report.zip)
          attachments: allure-report.zip
          secure: true
